name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # py_compile parses without importing, so the GUI-only deps
      # (pyautogui/pygetwindow, absent on Linux) are not required here.
      - name: Compile-check Python sources
        run: python -m py_compile stt.py web.py audio_split.py register.py selfcheck.py
