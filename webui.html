<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scribe · 音频转录字幕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg,#fafafa);color:var(--fg,#171717);font-family:'Geist',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;font-feature-settings:'liga' 1,'ss05' 1;letter-spacing:-0.02em;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button{font-family:inherit;letter-spacing:inherit}
input{font-family:inherit;letter-spacing:inherit}
::selection{background:rgba(120,120,120,.2)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0}to{opacity:1}}
.mono{font-family:'Geist Mono',ui-monospace,monospace}
::placeholder{color:var(--mut-fg);opacity:1}
#toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);z-index:90;background:var(--fg,#171717);color:var(--bg,#fff);font-size:13px;padding:10px 16px;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:pop .16s ease;max-width:80vw}
/* 键盘可见焦点 — 用现有 --fg token,light/dark 自适应 */
[data-act]:focus-visible,button:focus-visible,[tabindex]:focus-visible,input:focus-visible{outline:2px solid var(--fg);outline-offset:2px;border-radius:6px}
/* 窄屏 header — 基础样式为内联,优先级高于样式表,故覆盖处需 !important */
/* ponytail: !important 因 header 基础样式内联;若 header 继续膨胀再整体迁移到 class 基础样式 */
@media (max-width:640px){
  .hdr{flex-wrap:wrap!important;height:auto!important;padding:10px 16px!important;gap:10px!important}
  .hdr-actions{flex-wrap:wrap;gap:9px!important;justify-content:flex-start}
  .hdr-nav button{min-height:44px;padding:8px 14px!important}
  .hdr [data-act="toggleTheme"]{width:44px!important;height:44px!important}
}
@media (max-width:480px){.hdr-meta{display:none!important}}
/* 转录页正文栅格 — 窄屏塌陷为单列(基础样式内联,故 !important) */
@media (max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr!important}}
/* 账号管理页窄屏 — 基础样式内联,故 !important。统计卡 4→2 列;header 动作簇换行、按钮内文字不断行;
   账号行 flex-wrap:邮箱回首行、删除留首行右侧(order:1)、额度整条下移铺满(order:2) */
@media (max-width:640px){
  .acct-stats{grid-template-columns:1fr 1fr!important}
  .acct-actions{flex-wrap:wrap!important}
  .acct-actions button,.acct-actions label{white-space:nowrap!important}
  .acct-row{flex-wrap:wrap!important}
  .acct-row .acct-del{order:1}
  .acct-row .acct-quota{order:2;flex:1 0 100%!important;width:auto!important;text-align:left!important}
}
/* 触控设备最小命中区 44×44(coarse 指针才放大,鼠标端保持紧凑密度) */
@media (pointer:coarse){.tap{min-width:44px!important;min-height:44px!important;height:auto!important}}
/* 降级动效:装饰性 fadein/pop 与过渡归零;加载 spinner 是功能反馈,豁免保留旋转 */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
  .spin{animation-duration:.7s!important;animation-iteration-count:infinite!important}
}
</style>
</head>
<body>
<div id="app" style="min-height:100vh"></div>
<script>
// ------------------------------------------------------------------ themes
const THEMES = {
  // --red 用于填充/进度条;--red-fg 是文字/边框态,浅色下压深以达 4.5:1(深色 --red 已达标,保持一致)
  light:{'--bg':'#fafafa','--panel':'#ffffff','--muted':'#f2f2f2','--muted2':'#fafafa','--border':'#ebebeb','--fg':'#171717','--mut-fg':'#5c5c5c','--accent':'#171717','--accent-fg':'#ffffff','--green':'#297a3a','--red':'#e5484d','--red-fg':'#c2333a','--amber':'#b45309','--track':'#ebebeb','--shadow':'0 1px 2px rgba(0,0,0,.05)'},
  dark:{'--bg':'#0a0a0a','--panel':'#151515','--muted':'#1f1f1f','--muted2':'#141414','--border':'#2a2a2a','--fg':'#ededed','--mut-fg':'#a1a1a1','--accent':'#ededed','--accent-fg':'#0a0a0a','--green':'#45dec5','--red':'#e5484d','--red-fg':'#e5484d','--amber':'#eec32d','--track':'#2a2a2a','--shadow':'0 1px 2px rgba(0,0,0,.4)'},
};
function applyTheme(name){const t=THEMES[name]||THEMES.light;const r=document.documentElement.style;Object.keys(t).forEach(k=>r.setProperty(k,t[k]))}

// ------------------------------------------------------------------- state
const S = {
  theme:'light', view:'transcribe',
  data:null,                 // /api/state payload
  files:[],                  // {id,name,size,duration,credits,ext,uploading}
  params:{language:'auto',languageName:'自动检测',format:'srt',vocab:['ElevenLabs'],
          tag_audio_events:true,include_subtitles:true,no_verbatim:false,
          use_speaker_library:false,show_cost:false,skip_silence:false},
  keyterm:'', langOpen:false, langQuery:'', mode:'batch',
  plan:null, status:'idle', results:[],
  // 高级 · 手动指定账号：allowedEmails 空数组 = 自动分配（默认）
  acctPanelOpen:false, allowedEmails:[],
  // /api/transcribe/progress payload + 底栏「详情」日志面板开关
  transProgress:null, transLogOpen:false,
  // 应用内确认弹层 {title,lines,okLabel,resolve} | null,替代原生 confirm()
  confirmBox:null,
  // accounts view
  query:'', sortKey:'created', sortDir:'desc', sortOpen:false,
  selected:[], revealed:[],
  loginOpen:false, regOpen:false,
  page:1, pageSize:5, login:null, reg:null, busy:null,   // pagination + login/register flow
  regProgress:null,          // /api/accounts/register/progress payload (注册弹窗日志区)
  _pageEmails:[], _page:1, _totalPages:1,        // filled by accountsView() for handlers
  // 功能管理 · 长音频切分：files 复用 upload 流,plans 存后端真实切分方案(id→{segments,hard,error})
  tool:{files:[],plans:{},expanded:[],results:[],outPath:'out',chunkSecs:'',
        silenceDb:'-30',silenceMin:'0.5',skipSilence:false,skipMin:'',
        advOpen:false,status:'idle',phase:''},
};

// --------------------------------------------------------------- utilities
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt = n => Math.round(n||0).toLocaleString('en-US');
const humanSize = b => b>=1e6? (b/1e6).toFixed(1)+' MB' : (b/1e3).toFixed(0)+' KB';
const dur2str = s => { if(s==null) return '—'; s=Math.round(s); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); };
// h:mm:ss (or m:ss under 1h) — 长音频切分方案里段时长常 > 1h,dur2str 的 MM:SS 会溢出
const clock = s => { if(s==null) return '—'; s=Math.max(0,Math.round(s)); const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60,p=n=>String(n).padStart(2,'0'); return h>0?`${h}:${p(m)}:${p(x)}`:`${m}:${p(x)}`; };
function toast(msg){ let t=document.getElementById('toast'); if(t)t.remove(); t=document.createElement('div'); t.id='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t&&t.remove(),2600); }

async function api(path,opts){ const r=await fetch(path,opts); return r.json(); }

function measureDuration(file){return new Promise(res=>{const a=document.createElement('audio');a.preload='metadata';a.onloadedmetadata=()=>{const d=isFinite(a.duration)?a.duration:null;URL.revokeObjectURL(a.src);res(d)};a.onerror=()=>{res(null)};a.src=URL.createObjectURL(file)})}

function downloadB64(name,b64){const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);const url=URL.createObjectURL(new Blob([arr]));const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}

// ----------------------------------------------------------- style helpers
const seg=on=>'flex:1;padding:7px 0;text-align:center;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;transition:background .12s,color .12s,box-shadow .12s,border-color .12s;'+(on?'background:var(--panel,#fff);color:var(--fg);box-shadow:var(--shadow);border:1px solid var(--border)':'background:transparent;color:var(--mut-fg);border:1px solid transparent');
const navSeg=on=>'padding:6px 15px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:background .12s,color .12s,box-shadow .12s;'+(on?'background:var(--panel,#fff);color:var(--fg);box-shadow:var(--shadow)':'background:transparent;color:var(--mut-fg)');
const cbBox=on=>'flex:none;width:19px;height:19px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s,border-color .12s;'+(on?'background:var(--accent);color:var(--accent-fg);border:1px solid var(--accent)':'background:var(--panel,#fff);border:1.5px solid var(--border);color:transparent');
const CHECK='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
function toggle(on,act){return `<div data-act="${act}" role="switch" aria-checked="${!!on}" tabindex="0" style="flex:none;width:38px;height:22px;border-radius:999px;cursor:pointer;position:relative;`+(on?'background:var(--accent)':'background:var(--muted);border:1px solid var(--border)')+`"><span style="position:absolute;top:2px;${on?'right:2px':'left:2px'};width:18px;height:18px;border-radius:50%;background:`+(on?'var(--accent-fg)':'var(--panel,#fff);box-shadow:var(--shadow)')+`"></span></div>`;}

// ------------------------------------------------------------------ header
function headerHTML(){
  const pool=S.data?S.data.pool:{fresh:0,total:0};
  return `<header class="hdr" style="position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--bg);border-bottom:1px solid var(--border)">
    <div class="hdr-brand" style="display:flex;align-items:center;gap:11px">
      <svg width="19" height="17" viewBox="0 0 24 22" fill="none"><path d="M12 1 L23 21 L1 21 Z" fill="var(--fg)"></path></svg>
      <span style="font-size:14px;font-weight:600;letter-spacing:-0.03em">Scribe · 音频转录字幕</span>
      <span class="hdr-meta" style="font-size:12px;color:var(--mut-fg);border-left:1px solid var(--border);padding-left:11px">ElevenLabs</span>
    </div>
    <div class="hdr-actions" style="display:flex;align-items:center;gap:12px">
      <nav class="hdr-nav" style="display:flex;align-items:center;gap:2px;padding:3px;background:var(--muted);border-radius:6px">
        <button data-act="goTranscribe" style="${navSeg(S.view==='transcribe')}">转录</button>
        <button data-act="goAccounts" style="${navSeg(S.view==='accounts')}">账号管理</button>
        <button data-act="goTools" style="${navSeg(S.view==='tools')}">功能管理</button>
      </nav>
      <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--mut-fg);border:1px solid var(--border);border-radius:999px;padding:5px 11px">
        <span style="width:7px;height:7px;border-radius:50%;background:var(--green)"></span>账号池 ${pool.fresh} 满额
      </div>
      <button data-act="toggleTheme" style="width:34px;height:34px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center">${S.theme==='dark'?'☾':'☀'}</button>
    </div>
  </header>`;
}

// --------------------------------------------------------- transcribe view
const MERGEABLE=['srt','vtt','txt'];   // 可合并导出格式,与 stt._MERGERS 保持一致
const splitInfo=name=>((S.plan&&S.plan.files)||[]).find(x=>x.name===name)||null;
// 需切分 = 时长超过单满额账号可转录秒数(chunkSecs,由 /api/state 下发)
const splitFiles=()=>S.files.filter(f=>!f.uploading&&f.duration&&S.data&&f.duration>S.data.chunkSecs);

function fileRowHTML(f,i){
  const done=S.status==='done';
  const right = done && !f.failed
    ? `<button data-act="download" data-arg="${i}" style="flex:none;display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:12px;font-weight:500;cursor:pointer">下载 ${esc((f.download||'').split('.').pop().toUpperCase())}</button>`
    : `<div data-act="removeFile" data-arg="${i}" role="button" tabindex="0" aria-label="移除文件 ${esc(f.name)}" class="tap" style="flex:none;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--mut-fg);cursor:pointer;font-size:13px">✕</div>`;
  const credits = f.uploading? '…' : (f.credits!=null? fmt(f.credits) : '—');
  return `<div style="display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--border);border-radius:6px;background:var(--panel,#fff)">
    <div style="flex:none;width:38px;height:38px;border-radius:6px;background:var(--muted);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--mut-fg);border:1px solid var(--border)" class="mono">${esc(f.ext)}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:8px;min-width:0">
        <span style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(f.name)}</span>
        ${(si=>si&&si.segCount?`<span style="flex:none;font-size:11px;color:var(--amber);background:var(--muted);border:1px solid var(--border);border-radius:5px;padding:2px 7px">将切分为 ${si.segCount} 段${si.skipped>0?` · 省 ${clock(si.skipped)} 静音`:''}</span>`
          :si&&si.splitError?`<span title="${esc(si.splitError)}" style="flex:none;font-size:11px;color:var(--red)">切分失败</span>`:'')(splitInfo(f.name))}
      </div>
      <div style="margin-top:3px;font-size:12px;color:var(--mut-fg)" class="mono">${esc(humanSize(f.size))} · ${esc(dur2str(f.duration))}</div>
    </div>
    <div style="flex:none;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mut-fg);background:var(--muted);border:1px solid var(--border);border-radius:6px;padding:5px 9px" class="mono">≈ ${credits}<span style="opacity:.55">credits</span></div>
    ${right}
  </div>`;
}

// 根据当前 S.langQuery 过滤并生成语言下拉的选项行 html。
// 抽出为独立函数,供 langDropdownHTML 首次渲染与 langQuery 输入时的局部更新复用。
function langRowsHTML(){
  const opts=[{name:'自动检测',code:'auto'},...(S.data?S.data.languages:[])];
  const q=S.langQuery.trim().toLowerCase();
  const shown=opts.filter(o=>!q||o.name.toLowerCase().includes(q)||o.code.includes(q)).slice(0,60);
  return shown.map(o=>{const on=S.params.language===o.code;
    return `<div data-act="pickLang" data-code="${esc(o.code)}" data-name="${esc(o.name)}" role="option" aria-selected="${on}" tabindex="0" style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;font-size:13.5px;cursor:pointer;${on?'background:var(--muted)':''}">${esc(o.name)} ${o.code!=='auto'?'· <span class="mono" style="color:var(--mut-fg);font-size:11px">'+esc(o.code)+'</span>':''}${on?'<span style="color:var(--green)">✓</span>':''}</div>`;}).join('');
}

function langDropdownHTML(){
  if(!S.langOpen) return '';
  // 选项行包在 [data-lang-rows] 容器里,langQuery 输入时只重建该容器的 innerHTML,
  // 搜索框本身不被销毁,焦点/光标自然保留、零闪烁(不再全量 render + refocus)。
  return `<div style="position:absolute;top:74px;left:0;right:0;z-index:10;background:var(--panel,#fff);border:1px solid var(--border);border-radius:6px;box-shadow:0 10px 30px rgba(0,0,0,.12);padding:6px;animation:fadein .12s ease;max-height:320px;overflow:auto">
    <input data-input="langQuery" value="${esc(S.langQuery)}" placeholder="搜索 ${(S.data?S.data.languages.length:157)} 种语言…" style="width:100%;box-sizing:border-box;padding:8px 10px;margin-bottom:4px;border:none;border-bottom:1px solid var(--border);outline:none;background:transparent;color:var(--fg);font-size:13px"/>
    <div data-lang-rows role="listbox" aria-label="识别语言">${langRowsHTML()}</div>
    <div style="padding:9px 10px 4px;font-size:11px;color:var(--mut-fg);border-top:1px solid var(--border);margin-top:4px">支持 ISO 639-3 代码,或输入 auto 自动检测</div>
  </div>`;
}

function formatChipsHTML(){
  return (S.data?S.data.formats:['srt']).map(f=>{const on=S.params.format===f;
    return `<div data-act="pickFormat" data-arg="${f}" role="radio" aria-checked="${on}" tabindex="0" class="mono tap" style="display:inline-flex;align-items:center;justify-content:center;padding:8px 14px;border-radius:6px;font-size:12.5px;font-weight:${on?600:500};cursor:pointer;${on?'background:var(--accent);color:var(--accent-fg);border:1px solid var(--accent)':'background:var(--panel,#fff);color:var(--mut-fg);border:1px solid var(--border)'}">${f.toUpperCase()}</div>`;}).join('');
}

function keytermsHTML(){
  const chips=S.params.vocab.map((t,i)=>`<span style="display:flex;align-items:center;gap:6px;padding:4px 9px;border-radius:6px;background:var(--muted);border:1px solid var(--border);font-size:12.5px">${esc(t)}<span data-act="removeTerm" data-arg="${i}" role="button" tabindex="0" aria-label="移除词汇 ${esc(t)}" style="color:var(--mut-fg);cursor:pointer">✕</span></span>`).join('');
  return `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);min-height:42px">
    ${chips}
    <input data-input="keyterm" data-enter="addTerm" value="${esc(S.keyterm)}" placeholder="输入后回车添加…" style="flex:1;min-width:120px;border:none;outline:none;background:transparent;color:var(--fg);font-size:13px"/>
  </div>`;
}

function toggleRow(label,code,desc,key,span){
  return `<div style="${span?'grid-column:1 / -1;':''}display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 15px;border:1px solid var(--border);border-radius:6px">
    <div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:13.5px;font-weight:500">${label}</span><span style="font-size:10.5px;color:var(--mut-fg)" class="mono">${code}</span></div><div style="margin-top:2px;font-size:12px;color:var(--mut-fg)">${desc}</div></div>
    ${toggle(S.params[key],'tg:'+key)}
  </div>`;
}

function allocHTML(){
  const p=S.plan;
  if(!p) return '<div style="font-size:13px;color:var(--mut-fg);padding:6px">上传文件后自动计算分配…</div>';
  if(p.error) return `<div style="font-size:13px;color:var(--red);padding:11px 15px;border:1px solid var(--border);border-radius:6px;background:var(--muted2)">${esc(p.error)}</div>`;
  return (p.alloc||[]).map(a=>{
    const usePct=Math.round((a.useSum/Math.max(1,S.data.freshThreshold))*100)+'%';
    return `<div style="display:flex;align-items:center;gap:15px;padding:15px 17px;border:1px solid var(--border);border-radius:6px;background:var(--panel,#fff)">
      <div style="flex:none;width:36px;height:36px;border-radius:6px;background:var(--muted);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--mut-fg)">${esc((a.email||'?')[0].toUpperCase())}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">
          <span style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" class="mono">${esc(a.email)}</span>
          <span style="flex:none;font-size:11px;color:var(--mut-fg);background:var(--muted);border:1px solid var(--border);border-radius:5px;padding:2px 7px">${a.count} 个文件</span>
          ${a.isNew?'<span style="flex:none;font-size:11px;color:var(--amber)">需注册</span>':''}
        </div>
        <div style="margin-top:5px;font-size:12px;color:var(--mut-fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(a.files.join(' · '))}</div>
        <div style="margin-top:9px;height:6px;border-radius:999px;background:var(--track);overflow:hidden"><div style="height:100%;width:${usePct};background:var(--accent);border-radius:999px"></div></div>
      </div>
      <div style="flex:none;text-align:right;min-width:140px">
        <div style="font-size:13px;font-weight:600" class="mono">−${fmt(a.useSum)}</div>

  }).join('');
}

// 高级 · 手动指定账号（默认折叠）：勾选 = 限定分配候选集,交互样式复用切分页的 toggleAdv 折叠块
function acctPanelHTML(){
  const cands=((S.data&&S.data.accounts)||[]).filter(a=>!a.invalid);
  const nSel=S.allowedEmails.length;
  const minNeed=S.plan?S.plan.minNeed:null;
  const rows=cands.map(a=>{
    const on=S.allowedEmails.includes(a.email);
    const low=minNeed!=null&&a.rem!=null&&a.rem<minNeed;   // 弱判据,plan.error 兜底
    const dis=low&&!on;                                    // 已勾选的仍可取消
    return `<div ${dis?'':`data-act="toggleAllowed" data-arg="${esc(a.email)}" role="checkbox" aria-checked="${on}" tabindex="0"`} style="display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:6px;${dis?'opacity:.45;cursor:not-allowed':'cursor:pointer'}">
      <div style="${cbBox(on)}">${CHECK}</div>
      <span class="mono" style="flex:1;min-width:0;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(a.email)}</span>
      ${low?'<span style="flex:none;font-size:11px;color:var(--red)">额度不足</span>':''}
      <span class="mono" style="flex:none;font-size:12px;color:var(--mut-fg)">剩余 ${a.rem!=null?fmt(a.rem):'—'}</span>
    </div>`;}).join('');
  return `<div style="border:1px solid var(--border);border-radius:6px;overflow:hidden">
    <div data-act="toggleAcctPanel" role="button" tabindex="0" aria-expanded="${S.acctPanelOpen}" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;background:var(--muted2)">
      <span style="font-size:13px;font-weight:500">高级 · 手动指定账号 <span style="font-size:11px;color:var(--mut-fg);font-weight:400">· 限定分配候选集</span></span>
      <span style="display:flex;align-items:center;gap:9px"><span style="font-size:11px;color:${nSel?'var(--amber)':'var(--mut-fg)'};border:1px solid var(--border);border-radius:5px;padding:2px 8px">${nSel?`已选 ${nSel} 个账号`:'自动分配'}</span><span style="color:var(--mut-fg);font-size:13px">${S.acctPanelOpen?'▴':'▾'}</span></span>
    </div>
    ${S.acctPanelOpen?`<div style="border-top:1px solid var(--border);padding:8px;display:flex;flex-direction:column;gap:2px">
      <div style="padding:4px 12px 8px;font-size:11.5px;color:var(--mut-fg)">手动模式下额度不足会直接报错，不会自动注册新账号；清空勾选即回到自动分配。</div>
      ${rows||'<div style="padding:8px 12px;font-size:12.5px;color:var(--mut-fg)">暂无可用账号</div>'}
      ${nSel?`<div data-act="clearAllowed" role="button" tabindex="0" style="padding:8px 12px;font-size:12px;color:var(--mut-fg);cursor:pointer;text-decoration:underline;text-underline-offset:3px">清空选择（回到自动分配）</div>`:''}
    </div>`:''}
  </div>`;
}

function actionBarHTML(totalNeed,allocCount){
  const tp=S.transProgress;
  const detailBtn=`<span data-act="toggleTransLog" role="button" tabindex="0" aria-expanded="${S.transLogOpen}" style="flex:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px">详情 ${S.transLogOpen?'▴':'▾'}</span>`;
  // 完整日志面板：转录期间实时追加,失败后保留（S.transProgress 不清空）
  const logPanel=(tp&&S.transLogOpen)?`<div style="max-width:1024px;margin:0 auto;padding:10px 24px 0"><div data-translog style="height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;background:var(--muted2);padding:10px 12px;font-size:12px;line-height:1.7" class="mono">
      ${(tp.lines&&tp.lines.length)?tp.lines.map(l=>`<div>${esc(l)}</div>`).join(''):'<div style="color:var(--mut-fg)">等待日志…</div>'}
      ${tp.error?`<div style="color:var(--red)">${esc(tp.error)}</div>`:''}</div></div>`:'';
  let inner,actPanel='';
  if(S.status==='running'){
    // 并发活动任务列表：active = [{file, stage}] 多行渲染;串行阶段回落到顶层 stage
    const acts=(tp&&tp.active)?tp.active:[];
    const cur=acts.length?`${acts.length} 个任务进行中`:(tp&&tp.stage?tp.stage:'');
    if(acts.length)actPanel=`<div style="max-width:1024px;margin:0 auto;padding:10px 24px 0;display:flex;flex-direction:column;gap:3px">
      ${acts.map(a=>`<div class="mono" style="font-size:12px;color:var(--mut-fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:8px;vertical-align:1px"></span>${esc(a.file)} — ${esc(a.stage)}</div>`).join('')}</div>`;
    const last=(tp&&tp.lines&&tp.lines.length)?tp.lines[tp.lines.length-1]:'';
    inner=`<div style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--mut-fg);min-width:0">
        <span class="spin" style="flex:none;width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--fg);border-radius:50%;display:inline-block;animation:spin .7s linear infinite"></span>
        <span class="mono" style="flex:none;color:var(--fg)">已完成 ${tp?tp.done||0:0}/${tp?tp.total||0:0}</span>
        ${cur?`<span style="flex:none;opacity:.5">·</span><span style="flex:none;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(cur)}</span>`:''}
        ${last?`<span style="flex:none;opacity:.5">·</span><span class="mono" style="min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(last)}</span>`:''}
        ${detailBtn}</div>
      <button style="flex:none;padding:10px 20px;border-radius:6px;border:none;background:var(--muted);color:var(--mut-fg);font-size:14px;font-weight:600;cursor:default">处理中…</button>`;
  } else if(tp&&tp.error&&S.status!=='done'){
    // 失败后：错误 + 日志保留在底栏,不只弹 toast
    inner=`<div style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--red);min-width:0">
        <span style="min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(tp.error)}</span>${detailBtn}</div>
      <button data-act="start" style="flex:none;display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:6px;border:none;background:var(--accent);color:var(--accent-fg);font-size:14px;font-weight:600;cursor:pointer">重试转录</button>`;
  } else if(S.status==='done'){
    const ok=S.results.filter(r=>r.ok).length;
    inner=`<div style="display:flex;align-items:center;gap:9px;font-size:13px;color:var(--fg)"><span style="width:20px;height:20px;border-radius:50%;background:var(--green);color:var(--accent-fg);display:flex;align-items:center;justify-content:center;font-size:12px">✓</span>转录完成 · 已自动下载 ${ok} 个字幕文件</div>
      <div style="display:flex;align-items:center;gap:9px">
        <button data-act="reset" style="padding:10px 16px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:13px;font-weight:500;cursor:pointer">重新开始</button>
        <button data-act="downloadAll" style="display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:6px;border:none;background:var(--accent);color:var(--accent-fg);font-size:14px;font-weight:600;cursor:pointer">全部下载</button>
      </div>`;
  } else if(S.plan&&S.plan.error){
    // 手动候选集装不下等预览错误：禁用开始按钮（同 MERGEABLE 灰按钮模式）
    inner=`<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--red);min-width:0"><span style="min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(S.plan.error)}</span></div>
      <button style="flex:none;display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:6px;border:none;background:var(--muted);color:var(--mut-fg);font-size:14px;font-weight:600;cursor:not-allowed">开始转录</button>`;
  } else if(splitFiles().length&&!MERGEABLE.includes(S.params.format)){
    inner=`<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--amber)">${S.params.format.toUpperCase()} 格式不支持长音频切分合并，请改用 SRT / VTT / TXT</div>
      <button style="display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:6px;border:none;background:var(--muted);color:var(--mut-fg);font-size:14px;font-weight:600;cursor:not-allowed">开始转录</button>`;
  } else {
    inner=`<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mut-fg)"><span>预计消耗</span><b style="color:var(--fg)" class="mono">${fmt(totalNeed)}</b><span>credits</span><span style="opacity:.5">·</span><span>覆盖 ${allocCount} 个账号</span></div>
      <button data-act="start" style="display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:6px;border:none;background:var(--accent);color:var(--accent-fg);font-size:14px;font-weight:600;cursor:pointer"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>开始转录</button>`;
  }
  return `<div style="position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--bg);border-top:1px solid var(--border)">${actPanel}${logPanel}<div style="max-width:1024px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px">${inner}</div></div>`;
}

// ----------------------------------------------------------- accounts view
function accountsView(){
  const accts=(S.data?S.data.accounts:[]);
  const q=S.query.trim().toLowerCase();
  let list=accts.filter(a=>!q||(a.email||'').toLowerCase().includes(q));
  const dir=S.sortDir==='asc'?1:-1, key=S.sortKey;
  list=[...list].sort((a,b)=>{
    if(key==='email') return (a.email<b.email?-1:a.email>b.email?1:0)*dir;
    let av,bv;
    if(key==='rem'){av=a.rem||0;bv=b.rem||0;} else if(key==='used'){av=a.used||0;bv=b.used||0;} else {av=a.created||0;bv=b.created||0;}
    return (av-bv)*dir;
  });
  const totalRem=accts.reduce((s,a)=>s+(a.rem||0),0);
  const fresh=accts.filter(a=>a.status==='fresh').length;
  const sortLabels={created:'创建时间',rem:'剩余额度',email:'邮箱名称',used:'使用量'};

  // pagination — slice the filtered+sorted list to the current page
  const filteredCount=list.length;
  const totalPages=Math.max(1,Math.ceil(filteredCount/S.pageSize));
  const page=Math.min(Math.max(1,S.page),totalPages);
  const startIdx=(page-1)*S.pageSize;
  const pageList=list.slice(startIdx,startIdx+S.pageSize);
  S._pageEmails=pageList.map(a=>a.email); S._page=page; S._totalPages=totalPages;
  const allSel=pageList.length>0 && pageList.every(a=>S.selected.includes(a.email));

  const rows=pageList.map(a=>{
    const sel=S.selected.includes(a.email), rev=S.revealed.includes(a.email);
    const pct=a.rem!=null&&a.limit?Math.round((a.rem/a.limit)*100):0;
    const statusText={fresh:'满额',partial:'部分可用',depleted:'已用尽',invalid:'失效',unknown:'未知'}[a.status]||a.status;
    const statusColor={fresh:'var(--green)',partial:'var(--amber)',depleted:'var(--red-fg)',invalid:'var(--red-fg)',unknown:'var(--mut-fg)'}[a.status]||'var(--mut-fg)';
    const barColor=a.rem===0?'var(--red)':pct<30?'var(--amber)':'var(--accent)';
    const pw=a.password?(rev?a.password:'••••••••••'):'—';
    return `<div class="acct-row" style="display:flex;align-items:center;gap:15px;padding:15px 17px;border-radius:6px;background:var(--panel,#fff);${sel?'border:1px solid var(--fg)':'border:1px solid var(--border)'}">
      <div data-act="toggleSel" data-arg="${esc(a.email)}" role="checkbox" aria-checked="${sel}" aria-label="选择账号 ${esc(a.email)}" style="${cbBox(sel)}">${CHECK}</div>
      <div style="flex:none;width:38px;height:38px;border-radius:6px;background:var(--muted);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--mut-fg)">${esc((a.email||'?')[0].toUpperCase())}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">
          <span style="font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" class="mono">${esc(a.email)}</span>
          <span style="flex:none;font-size:11px;border-radius:5px;padding:2px 8px;border:1px solid var(--border);color:${statusColor}">${statusText}</span>
        </div>
        <div style="margin-top:6px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--mut-fg)">
          <div style="display:flex;align-items:center;gap:7px"><span>密码</span><span class="mono" style="color:var(--fg);min-width:96px">${esc(pw)}</span>
            ${a.password?`<span data-act="toggleRev" data-arg="${esc(a.email)}" style="cursor:pointer">${rev?'🙈':'👁'}</span>`:''}
            ${a.password?`<span data-act="copyPw" data-arg="${esc(a.email)}" style="cursor:pointer" title="复制密码"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></span>`:''}</div>
          <span style="opacity:.5">·</span>
          <div style="display:flex;align-items:center;gap:6px" class="mono"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>${esc(a.createdStr)}</div>
        </div>
      </div>
      <div class="acct-quota" style="flex:none;width:170px;text-align:right">
        <div style="font-size:14px;font-weight:600" class="mono">${a.rem!=null?fmt(a.rem):'—'}</div>
        <div style="margin-top:2px;font-size:11px;color:var(--mut-fg)">剩余 / ${fmt(a.limit)}</div>
        <div style="margin-top:8px;height:6px;border-radius:999px;background:var(--track);overflow:hidden"><div style="height:100%;width:${pct}%;background:${barColor};border-radius:999px"></div></div>
      </div>
      <button data-act="delOne" data-arg="${esc(a.email)}" class="acct-del" style="flex:none;width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--mut-fg);cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
    </div>`;
  }).join('');

  const bulkBar = S.selected.length ? `<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:12px 16px;border:1px solid var(--fg);border-radius:6px;background:var(--muted2);animation:pop .14s ease">
      <div style="font-size:13px;font-weight:500">已选择 <b class="mono">${S.selected.length}</b> 个账号</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <button data-act="refreshSel" style="display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:12.5px;font-weight:500;cursor:pointer"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>刷新额度</button>
        <button data-act="exportSel" style="display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:12.5px;font-weight:500;cursor:pointer">导出 (.json)</button>
        <button data-act="delSel" style="display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:6px;border:1px solid var(--red-fg);background:var(--panel,#fff);color:var(--red-fg);font-size:12.5px;font-weight:500;cursor:pointer">删除</button>
        <button data-act="clearSel" style="padding:7px 12px;border-radius:6px;border:none;background:transparent;color:var(--mut-fg);font-size:12.5px;cursor:pointer">取消</button>
      </div></div>` : '';

  const pageSizeSel=[5,10,20,50].map(n=>`<div data-act="setPageSize" data-arg="${n}" style="padding:3px 10px;border-radius:5px;font-size:12px;cursor:pointer;${S.pageSize===n?'background:var(--panel,#fff);color:var(--fg);box-shadow:var(--shadow)':'color:var(--mut-fg)'}">${n}</div>`).join('');
  const rangeStart=filteredCount?startIdx+1:0, rangeEnd=Math.min(startIdx+S.pageSize,filteredCount);
  const pgBtn=dis=>`padding:7px 13px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);font-size:12.5px;${dis?'color:var(--mut-fg);opacity:.5;cursor:default':'color:var(--fg);cursor:pointer'}`;
  const pageChips=Array.from({length:totalPages},(_,i)=>i+1).map(n=>`<div data-act="gotoPage" data-arg="${n}" style="min-width:32px;height:32px;padding:0 8px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12.5px;cursor:pointer;${n===page?'background:var(--accent);color:var(--accent-fg)':'border:1px solid var(--border);color:var(--fg)'}">${n}</div>`).join('');
  const pager = totalPages>1 ? `<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding-top:2px">
      <span style="font-size:12.5px;color:var(--mut-fg)">显示第 ${rangeStart}–${rangeEnd} 条 · 共 ${filteredCount} 个账号</span>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <button data-act="prevPage" style="${pgBtn(page===1)}">上一页</button>${pageChips}<button data-act="nextPage" style="${pgBtn(page===totalPages)}">下一页</button>
      </div></div>` : '';

  return `<main style="max-width:1024px;margin:0 auto;padding:34px 24px 60px;display:flex;flex-direction:column;gap:22px">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <div><h1 style="margin:0;font-size:23px;font-weight:600;letter-spacing:-0.04em">账号管理</h1>
        <p style="margin:7px 0 0;font-size:14px;color:var(--mut-fg)">本地保存的 ElevenLabs 账号 · 邮箱、密码与剩余额度 · 数据存于 accounts.json</p></div>
      <div class="acct-actions" style="display:flex;align-items:center;gap:9px">
        <button data-act="exportSel" style="display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:13.5px;font-weight:500;cursor:pointer"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>导出</button>
        <label style="display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:13.5px;font-weight:500;cursor:pointer"><input data-input="importFile" type="file" accept="application/json,.json" style="display:none"/><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>导入账号</label>
        <button data-act="openLogin" style="display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:13.5px;font-weight:500;cursor:pointer"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>登录账号</button>
        <button data-act="openReg" style="display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:6px;border:none;background:var(--accent);color:var(--accent-fg);font-size:13.5px;font-weight:600;cursor:pointer"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>启动注册机</button>
      </div>
    </div>
    <div class="acct-stats" style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px">
      ${statCard('本地账号',accts.length)}${statCard('总剩余额度',fmt(totalRem))}${statCard('满额账号',fresh)}${statCard('已选择',S.selected.length)}
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:220px;display:flex;align-items:center;gap:9px;padding:0 12px;height:40px;border:1px solid var(--border);border-radius:6px;background:var(--panel,#fff)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--mut-fg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input data-input="query" value="${esc(S.query)}" placeholder="搜索邮箱…" style="flex:1;border:none;outline:none;background:transparent;color:var(--fg);font-size:13.5px"/>
      </div>
      <div style="position:relative">
        <button data-act="toggleSort" style="display:flex;align-items:center;gap:8px;height:40px;padding:0 13px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:13.5px;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="m21 8-4-4-4 4"/><path d="M17 4v16"/></svg><span style="color:var(--mut-fg);font-size:12px">排序</span>${sortLabels[S.sortKey]}<span style="color:var(--mut-fg)">▾</span></button>
        ${S.sortOpen?`<div style="position:absolute;top:46px;right:0;z-index:20;width:180px;background:var(--panel,#fff);border:1px solid var(--border);border-radius:6px;box-shadow:0 10px 30px rgba(0,0,0,.14);padding:6px;animation:fadein .12s ease">${['created','rem','email','used'].map(k=>`<div data-act="pickSort" data-arg="${k}" style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;font-size:13px;cursor:pointer;${S.sortKey===k?'background:var(--muted)':''}"><span>${sortLabels[k]}</span><span style="color:var(--green)">${S.sortKey===k?'✓':''}</span></div>`).join('')}</div>`:''}
      </div>
      <button data-act="toggleDir" style="display:flex;align-items:center;gap:7px;height:40px;padding:0 13px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:13px;cursor:pointer">${S.sortDir==='asc'?'↑':'↓'}<span style="color:var(--mut-fg)">${S.sortDir==='asc'?'升序':'降序'}</span></button>
    </div>
    <div style="display:flex;align-items:center;gap:13px;padding:0 4px">
      <div data-act="toggleAll" role="checkbox" aria-checked="${allSel}" aria-label="全选本页账号" style="${cbBox(allSel)}">${CHECK}</div>
      <span style="font-size:12.5px;color:var(--mut-fg)">全选本页 · 共 ${accts.length} 个账号</span>
      ${S.revealed.length?`<button data-act="hideAllPw" style="display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:12px;font-weight:500;cursor:pointer"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>隐藏 ${S.revealed.length} 个已显示密码</button>`:''}
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--mut-fg)">每页显示</span>
        <div style="display:flex;gap:2px;padding:2px;background:var(--muted);border-radius:6px">${pageSizeSel}</div>
        <span style="font-size:12px;color:var(--mut-fg)">条</span>
      </div>
    </div>
    ${bulkBar}
    <div style="display:flex;flex-direction:column;gap:10px">
      ${rows || `<div style="text-align:center;padding:48px 24px;border:1.5px dashed var(--border);border-radius:6px;color:var(--mut-fg)"><div style="font-size:14px;font-weight:500;color:var(--fg)">暂无账号</div><div style="margin-top:6px;font-size:12.5px">点击「登录账号」保存已有账号,或「启动注册机」批量创建。</div></div>`}
    </div>
    ${pager}
  </main>`;
}
function statCard(label,val){return `<div style="padding:14px 16px;border:1px solid var(--border);border-radius:6px;background:var(--panel,#fff)"><div style="font-size:12px;color:var(--mut-fg)">${label}</div><div style="margin-top:5px;font-size:20px;font-weight:600" class="mono">${val}</div></div>`;}

// ------------------------------------------------------------------ modals
const SPINNER='<span class="spin" style="width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--fg);border-radius:50%;display:inline-block;animation:spin .7s linear infinite"></span>';
function modalsHTML(){
  let h='';
  if(S.loginOpen){
    const busy=S.busy==='login', lg=S.login||{};
    const body=busy
      ? `<div style="padding:22px;display:flex;align-items:center;gap:11px;font-size:13px;color:var(--mut-fg)">${SPINNER}<span>正在登录 ElevenLabs 并获取令牌…</span></div>`
      : `<div style="padding:22px;display:flex;flex-direction:column;gap:16px">
          <p style="margin:0;font-size:12.5px;color:var(--mut-fg);line-height:1.55">输入你的 ElevenLabs 邮箱与密码,直接登录并把令牌保存到本机账号池(accounts.json),用于后续转录分配。</p>
          <div style="display:flex;flex-direction:column;gap:7px">
            <label style="font-size:13px;font-weight:500">邮箱</label>
            <input data-input="login.email" value="${esc(lg.email||'')}" placeholder="you@example.com" style="height:40px;padding:0 12px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:13.5px;outline:none" class="mono"/>
          </div>
          <div style="display:flex;flex-direction:column;gap:7px">
            <label style="font-size:13px;font-weight:500">密码</label>
            <input data-input="login.password" data-enter="submitLogin" value="${esc(lg.password||'')}" type="password" placeholder="••••••••" style="height:40px;padding:0 12px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:13.5px;outline:none" class="mono"/>
          </div>
        </div>`;
    const foot=busy
      ? `<button style="padding:9px 18px;border-radius:6px;border:none;background:var(--muted);color:var(--mut-fg);font-size:13.5px;font-weight:600;cursor:default">登录中…</button>`
      : `<button data-act="closeLogin" style="padding:9px 16px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:13.5px;font-weight:500;cursor:pointer">取消</button><button data-act="doLogin" style="padding:9px 18px;border-radius:6px;border:none;background:var(--accent);color:var(--accent-fg);font-size:13.5px;font-weight:600;cursor:pointer">登录并保存</button>`;
    h+=`<div data-act="${busy?'stop':'closeLogin'}" style="position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadein .12s ease"><div data-act="stop" style="width:100%;max-width:440px;background:var(--panel,#fff);border:1px solid var(--border);border-radius:6px;box-shadow:0 24px 64px rgba(0,0,0,.28);overflow:hidden;animation:pop .16s ease">
      <div style="padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between"><div style="font-size:15px;font-weight:600">登录账号</div><div data-act="${busy?'stop':'closeLogin'}" style="width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mut-fg)">✕</div></div>
      ${body}
      <div style="padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:9px;background:var(--muted2)">${foot}</div>
    </div></div>`;
  }
  if(S.regOpen){
    const busy=S.busy==='register', r=S.reg||{};
    const regIn=(field,ph,type,extra)=>`<input data-input="reg.${field}" value="${esc(r[field]==null?'':r[field])}"${type?` type="${type}"`:''}${extra||''} placeholder="${ph}" style="width:100%;box-sizing:border-box;height:40px;padding:0 12px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:13px;outline:none" class="mono"/>`;
    const lbl=(t,code)=>`<label style="font-size:13px;font-weight:500">${t}${code?` <span class="mono" style="color:var(--mut-fg);font-weight:400;font-size:11.5px">${code}</span>`:''}</label>`;
    const seg2=on=>`flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;${on?'background:var(--accent);color:var(--accent-fg)':'color:var(--mut-fg)'}`;
    const rp=S.regProgress;
    const showLog=busy||(rp&&rp.error);   // 失败时弹窗保留日志,不回到配置表单
    const body=showLog
      ? `<div style="padding:22px;display:flex;flex-direction:column;gap:12px">
          <div style="display:flex;align-items:center;gap:11px;font-size:13px;color:var(--mut-fg)">
            ${busy?SPINNER+'<span>注册机运行中 — 正在批量创建满额账号,可能需要几分钟,请勿关闭本页…</span>':`<span style="color:var(--red);font-weight:600">注册中断</span>`}
            <span class="mono" style="margin-left:auto;flex:none;color:var(--fg)">已完成 ${rp?rp.done||0:0}/${rp?rp.total||0:0}</span></div>
          <div data-reglog style="height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;background:var(--muted2);padding:10px 12px;font-size:12px;line-height:1.7" class="mono">
            ${rp&&rp.lines&&rp.lines.length?rp.lines.map(l=>`<div>${esc(l)}</div>`).join(''):'<div style="color:var(--mut-fg)">等待日志…</div>'}
            ${rp&&rp.error?`<div style="color:var(--red)">${esc(rp.error)}</div>`:''}</div>
        </div>`
      : `<div style="padding:22px;display:flex;flex-direction:column;gap:15px;max-height:calc(90vh - 150px);overflow:auto">
          <p style="margin:0;font-size:12.5px;line-height:1.55;color:var(--mut-fg)">对应 <span class="mono" style="color:var(--fg)">config.toml → [temp_email]</span>。保存会写回本地配置文件(双向同步)。注册机调用临时邮箱后端申请邮箱、完成 ElevenLabs 验证并批量创建满额账号,写入本机账号池。</p>
          <div style="display:flex;flex-direction:column;gap:7px">${lbl('临时邮箱后端地址','base_url')}${regIn('base_url','https://mail.example.com')}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
            <div style="display:flex;flex-direction:column;gap:7px">${lbl('管理员密码','admin_password')}${regIn('admin_password','x-admin-auth','password')}</div>
            <div style="display:flex;flex-direction:column;gap:7px">${lbl('站点密码','site_password')}${regIn('site_password','仅 needAuth 时填写','password')}</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

    const foot=busy

  if(S.importOpen){

    const inner=im.error
      ? `<div style="display:flex;gap:10px;padding:13px 14px;border:1px solid var(--red);border-radius:6px;background:color-mix(in srgb,var(--red) 8%,transparent)">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
          <div style="font-size:13px;line-height:1.5;color:var(--fg)">${esc(im.error)}</div></div>`
      : `<div style="display:flex;flex-direction:column;gap:10px">
          <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--border);border-radius:6px">
            <div style="width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:color-mix(in srgb,var(--green) 12%,transparent)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div><div style="font-size:14px;font-weight:600">成功导入 <span class="mono">${im.added}</span> 个账号</div>
              <div style="margin-top:2px;font-size:12px;color:var(--mut-fg)">已合并进本地账号池</div></div>
          </div>
          ${im.skipped?`<div style="font-size:12.5px;color:var(--mut-fg)">跳过 <span class="mono" style="color:var(--fg)">${im.skipped}</span> 个(邮箱重复或格式无效)</div>`:''}
        </div>`;
    h+=`<div data-act="closeImport" style="position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadein .12s ease"><div data-act="stop" style="width:100%;max-width:420px;background:var(--panel,#fff);border:1px solid var(--border);border-radius:6px;box-shadow:0 24px 64px rgba(0,0,0,.28);overflow:hidden;animation:pop .16s ease">
      <div style="padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:9px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg><span style="font-size:15px;font-weight:600">导入账号</span></div><div data-act="closeImport" style="width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mut-fg)">✕</div></div>
      <div style="padding:22px;display:flex;flex-direction:column;gap:14px">
        <div class="mono" style="font-size:12px;color:var(--mut-fg);word-break:break-all">${esc(im.fileName)}</div>
        ${inner}
      </div>
      <div style="padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:9px;background:var(--muted2)"><button data-act="closeImport" style="padding:9px 18px;border-radius:6px;border:none;background:var(--accent);color:var(--accent-fg);font-size:13.5px;font-weight:600;cursor:pointer">完成</button></div>
    </div></div>`;
  }
  if(S.confirmBox){   // 应用内额度确认,替代原生 confirm();背景点/取消=cancel,Esc 见 keydown
    const c=S.confirmBox;
    h+=`<div data-act="confirmCancel" style="position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadein .12s ease"><div data-act="stop" style="width:100%;max-width:420px;background:var(--panel,#fff);border:1px solid var(--border);border-radius:6px;box-shadow:0 24px 64px rgba(0,0,0,.28);overflow:hidden;animation:pop .16s ease">
      <div style="padding:18px 22px;border-bottom:1px solid var(--border);font-size:15px;font-weight:600">${esc(c.title||'确认开始转录')}</div>
      <div style="padding:20px 22px;display:flex;flex-direction:column;gap:10px">
        ${c.lines.map(l=>`<div style="display:flex;gap:9px;font-size:13.5px;color:var(--fg);line-height:1.5"><span style="flex:none;color:var(--mut-fg)">·</span><span>${esc(l)}</span></div>`).join('')}
      </div>

        <button data-act="confirmOk" style="padding:9px 18px;border-radius:6px;border:none;background:${c.danger?'var(--red)':'var(--accent)'};color:${c.danger?'#fff':'var(--accent-fg)'};font-size:13.5px;font-weight:600;cursor:pointer">${esc(c.okLabel||'确认')}</button>
      </div>

  return h;
}

// ----------------------------------------------------- 功能管理 · 长音频切分
const stemOf = name => String(name||'').replace(/\.[^.\/\\]+$/,'');

// 当前生效的 chunk 秒数：用户填了就用填的(clamp),否则用账号推导默认值
function toolChunkVal(){
  const def=(S.data&&S.data.chunkSecs)||0;
  const raw=S.tool.chunkSecs;
  if(raw===''||raw==null) return def;
  const n=parseInt(String(raw).replace(/[^0-9]/g,''),10);
  return isNaN(n)?def:Math.max(30,Math.min(1800,n));
}
function toolSegCount(f){
  const p=S.tool.plans[f.id];
  if(!p||p.error) return null;
  return (p.segments||[]).length;
}
function toolTotalSegs(){
  return S.tool.files.reduce((n,f)=>{const c=toolSegCount(f);return n+(c||0);},0);
}

function toolSegTableHTML(f){
  const p=S.tool.plans[f.id]; if(!p) return '';
  const cps=(S.data&&S.data.cps)||1;
  const outDir=(S.tool.outPath||'out')+'/'+stemOf(f.name)+'-chunks';
  if(p.error) return `<div style="border-top:1px solid var(--border);background:var(--muted2);padding:11px 14px;font-size:12px;color:var(--red)">${esc(p.error)}</div>`;
  const rows=(p.segments||[]).map((seg,i)=>{
    const st=seg[0],en=seg[1],len=en-st,hard=(p.hard||[])[i];
    const tagStyle='flex:none;min-width:52px;text-align:right;color:'+(hard?'var(--amber)':'var(--green)');
    return `<div style="display:flex;align-items:center;gap:12px;padding:8px 12px;font-size:12px" class="mono">
      <span style="flex:none;width:56px;color:var(--fg);font-weight:600">part${String(i).padStart(2,'0')}</span>
      <span style="flex:1;min-width:0;color:var(--mut-fg)">${clock(st)} → ${clock(en)}</span>
      <span style="flex:none;color:var(--fg)">${clock(len)}</span>
      <span style="flex:none;width:64px;text-align:right;color:var(--mut-fg)">${len.toFixed(1)}s</span>
      <span style="flex:none;width:96px;text-align:right;color:var(--mut-fg)">≈ ${fmt(Math.round(len*cps))} cr</span>
      <span style="${tagStyle}">${hard?'硬切':'静音点'}</span>
    </div>`;}).join('');
  return `<div style="border-top:1px solid var(--border);background:var(--muted2);padding:6px">${rows}
    <div style="padding:7px 12px 5px;font-size:11px;color:var(--mut-fg)" class="mono">保存至 · ${esc(outDir)}</div></div>`;
}

function toolFileRowHTML(f){
  const seg=toolSegCount(f);
  const p=S.tool.plans[f.id];
  const expanded=f.id&&S.tool.expanded.includes(f.id);
  const hardCount=(p&&!p.error)?(p.hard||[]).filter(Boolean).length:0;
  const segStr=f.uploading?'…':(p&&p.error?'!':(seg==null?'…':seg));
  const hardBadge=hardCount?`<div style="flex:none;font-size:11px;color:var(--amber);border:1px solid var(--border);border-radius:5px;padding:4px 8px" title="窗口内无静音,按时长硬切">${hardCount} 硬切</div>`:'';
  const skipBadge=(p&&!p.error&&p.skipped>0)?`<div style="flex:none;font-size:11px;color:var(--green);border:1px solid var(--border);border-radius:5px;padding:4px 8px" title="被跳过的长静音总时长,不保存进片段">省 ${clock(p.skipped)} 静音</div>`:'';
  return `<div style="border:1px solid var(--border);border-radius:6px;background:var(--panel,#fff);overflow:hidden">
    <div style="display:flex;align-items:center;gap:14px;padding:13px 16px">
      <div style="flex:none;width:38px;height:38px;border-radius:6px;background:var(--muted);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--mut-fg);border:1px solid var(--border)" class="mono">${esc(f.ext)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(f.name)}</div>
        <div style="margin-top:3px;font-size:12px;color:var(--mut-fg)" class="mono">${esc(humanSize(f.size))} · ${esc(clock(f.duration))} · ${f.duration!=null?f.duration.toFixed(1)+'s':'—'}</div>
      </div>
      <div style="flex:none;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg);background:var(--muted);border:1px solid var(--border);border-radius:6px;padding:5px 10px" class="mono">→ ${segStr} 段</div>
      ${hardBadge}${skipBadge}
      ${p&&!p.error?`<div data-act="toolToggle" data-arg="${esc(f.id)}" style="flex:none;display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--mut-fg);font-size:12px;cursor:pointer">${expanded?'收起方案':'查看方案'}<span>${expanded?'▴':'▾'}</span></div>`:''}
      <div data-act="toolRemove" data-arg="${esc(f.id)}" style="flex:none;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--mut-fg);cursor:pointer;font-size:13px">✕</div>
    </div>
    ${(expanded||(p&&p.error))?toolSegTableHTML(f):''}
  </div>`;
}

function toolBarHTML(){
  const st=S.tool.status, n=S.tool.files.length, segs=toolTotalSegs(), chunk=toolChunkVal();
  if(st==='running'){
    return `<div style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--mut-fg)">
        <span class="spin" style="width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--fg);border-radius:50%;display:inline-block;animation:spin .7s linear infinite"></span>${esc(S.tool.phase||'处理中…')}</div>
      <button style="padding:10px 20px;border-radius:6px;border:none;background:var(--muted);color:var(--mut-fg);font-size:14px;font-weight:600;cursor:default">执行中…</button>`;
  }
  if(st==='done'){
    const done=S.tool.results.filter(r=>r.ok).length, tot=S.tool.results.reduce((a,r)=>a+(r.segCount||0),0);
    return `<div style="display:flex;align-items:center;gap:9px;font-size:13px;color:var(--fg)">
        <span style="width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px">✓</span>
        <span>已切分 ${done} 个文件 · ${tot} 个片段已保存到 ${esc(S.tool.outPath||'out')}</span></div>
      <button data-act="resetSplit" style="padding:10px 16px;border-radius:6px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);font-size:13px;font-weight:500;cursor:pointer">再切分一批</button>`;
  }
  const disabled=n===0;
  const btn=disabled
    ? `<button style="display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:6px;border:none;background:var(--muted);color:var(--mut-fg);font-size:14px;font-weight:600;cursor:not-allowed">开始执行切分</button>`
    : `<button data-act="runSplit" style="display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:6px;border:none;background:var(--accent);color:var(--accent-fg);font-size:14px;font-weight:600;cursor:pointer"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4"/></svg>开始执行切分</button>`;
  return `<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mut-fg)">
      <span>${n} 个文件</span><span style="opacity:.5">·</span><span>切分为</span><b style="color:var(--fg)" class="mono">${segs}</b><span>段</span>
      <span style="opacity:.5">·</span><span>每段 ≤ ${chunk}s,适配单个满额账号</span></div>${btn}`;
}

function toolsView(){
  const d=S.data||{}, chunk=toolChunkVal(), n=S.tool.files.length, segs=toolTotalSegs();
  const outEx=(S.tool.outPath||'out')+'/<文件名>-chunks/';
  const files=S.tool.files.map(toolFileRowHTML).join('');

        <span style="width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px">✓</span>
        切分完成 · 共生成 ${S.tool.results.reduce((a,r)=>a+(r.segCount||0),0)} 个片段</div>

  return `<main style="max-width:1024px;margin:0 auto;padding:34px 24px 132px;display:flex;flex-direction:column;gap:26px">

      </div>
      <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--mut-fg);border:1px solid var(--border);border-radius:999px;padding:5px 12px" class="mono">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="12" x="3" y="4" rx="2"/><line x1="7" x2="17" y1="20" y2="20"/></svg>stt.py · audio_split
      </div>
    </div>
    <div style="border:1px solid var(--border);border-radius:6px;background:var(--panel,#fff);overflow:hidden">
      <div style="display:flex;align-items:flex-start;gap:15px;padding:20px 22px;border-bottom:1px solid var(--border)">
        <div style="flex:none;font-size:13px;font-weight:600;color:var(--mut-fg);padding-top:2px" class="mono">01</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <h2 style="margin:0;font-size:17px;font-weight:600;letter-spacing:-0.03em">长音频切分</h2>
