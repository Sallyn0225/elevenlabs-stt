// ------------------------------------------------------------------ render
function render(){
  const app=document.getElementById('app');
  const view = S.view==='transcribe'?transcribeView():S.view==='accounts'?accountsView():toolsView();
  app.innerHTML = headerHTML() + view + modalsHTML();
  updateTopBtn();
  const lg=document.querySelector('[data-reglog]'); if(lg)lg.scrollTop=lg.scrollHeight; // 注册日志区滚动到底
  const tl=document.querySelector('[data-translog]'); if(tl)tl.scrollTop=tl.scrollHeight; // 转录日志区滚动到底
  a11yPass();
}

// 渲染后归一化:非语义交互元素(data-act 的 div/span)补 tabindex+role,使键盘可聚焦、读屏可识别。
// 键盘激活见下方 keydown 委托;开关类元素在各自 helper 里已带 role=switch/checkbox + aria-checked。
function a11yPass(){
  document.querySelectorAll('#app [data-act]').forEach(el=>{
    if(/^(BUTTON|A|INPUT|LABEL|TEXTAREA)$/.test(el.tagName))return;
    if(!el.hasAttribute('tabindex'))el.tabIndex=0;
    if(!el.hasAttribute('role'))el.setAttribute('role','button');
  });
}

// 应用内确认:返回 Promise<boolean>,替代原生 confirm()。resolve 由 confirmOk/confirmCancel 委托触发。
function uiConfirm(opts){
  return new Promise(res=>{ S.confirmBox={title:opts.title,lines:opts.lines||[],okLabel:opts.okLabel,danger:opts.danger,resolve:res}; render(); });
}
function closeConfirm(ok){ const r=S.confirmBox&&S.confirmBox.resolve; S.confirmBox=null; render(); if(r)r(ok); }
// 复制密码 30s 后尝试清空剪贴板:仅当当前剪贴板仍是该密码时才清,读不到(权限/失焦)则放弃,不误清用户后续复制的内容
let _clipTimer=null;
function clearClipboardLater(val){
  if(_clipTimer)clearTimeout(_clipTimer);
  _clipTimer=setTimeout(()=>{ _clipTimer=null;
    try{ navigator.clipboard.readText().then(cur=>{ if(cur===val)navigator.clipboard.writeText('').catch(()=>{}); }).catch(()=>{}); }catch(e){}
  },30000);
}

// back-to-top: a single persistent button outside #app, shown on the accounts page
// after scrolling. Kept off the render() innerHTML so scroll never re-renders the app.
function updateTopBtn(){
  let b=document.getElementById('toTop');
  const show=S.view==='accounts' && (window.scrollY||document.documentElement.scrollTop||0)>400;
  if(show&&!b){
    b=document.createElement('button'); b.id='toTop'; b.title='回到顶部';
    b.style.cssText='position:fixed;right:24px;bottom:24px;z-index:55;width:44px;height:44px;border-radius:999px;border:1px solid var(--border);background:var(--panel,#fff);color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 22px rgba(0,0,0,.16);animation:pop .16s ease';
    b.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>';
    b.onclick=()=>{try{window.scrollTo({top:0,behavior:'smooth'});}catch(e){window.scrollTo(0,0);}};
    document.body.appendChild(b);
  }else if(!show&&b){ b.remove(); }
}
window.addEventListener('scroll',updateTopBtn);

// ------------------------------------------------------------- interactions
async function refreshPlan(){
  const ready=S.files.filter(f=>!f.uploading);
  if(!ready.length){ S.plan=null; return; }
  S.plan=await api('/api/plan',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({files:ready.map(f=>({id:f.id,name:f.name,duration:f.duration})),
      allowedEmails:S.allowedEmails,skipSilence:S.params.skip_silence})});
  render();
}

async function addFiles(fileList){
  const toTool=S.view==='tools';          // 按当前 view 分流：功能管理→tool 文件流,否则转录流
  const list=toTool?S.tool.files:S.files;
  if(toTool&&fileList.length)S.tool.status='idle';   // done 后再加文件回到 idle(与设计稿交互一致)
  for(const file of fileList){
    if(file.size>1000*1024*1024){ toast(`${file.name} 超过 1000 MB,已跳过`); continue; }
    const ext=(file.name.split('.').pop()||'').toUpperCase().slice(0,4);
    const entry={id:null,name:file.name,size:file.size,duration:null,credits:null,ext,uploading:true};
    list.push(entry); render();
    const dur=await measureDuration(file);
    entry.duration=dur;
    const qs=new URLSearchParams({name:file.name}); if(dur)qs.set('duration',dur);
    try{
      const res=await api('/api/upload?'+qs,{method:'POST',body:file});
      entry.id=res.id; entry.duration=res.duration!=null?res.duration:dur; entry.credits=res.credits; entry.uploading=false;
      toast(file.name+' 上传成功');
    }catch(e){ entry.uploading=false; entry.credits=null; toast(file.name+' 上传失败'); }
    render();
  }
  if(toTool) refreshToolPlans(); else refreshPlan();
}

// 对全部已就绪的 tool 文件请求真实切分方案(后端 detect_silences+plan_cuts,静音结果缓存)
let _toolPlanSeq=0;
async function refreshToolPlans(){
  const ready=S.tool.files.filter(f=>f.id&&!f.uploading);
  if(!ready.length){ S.tool.plans={}; render(); return; }
  const seq=++_toolPlanSeq;
  const res=await api('/api/split/plan',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({uploads:ready.map(f=>f.id),chunk_secs:toolChunkVal(),
      silence_db:S.tool.silenceDb,silence_min:S.tool.silenceMin,
      skip_silence:S.tool.skipSilence,skip_min:S.tool.skipMin})});
  if(seq!==_toolPlanSeq) return;   // 期间又发起了新 plan,丢弃过期响应防乱序覆盖
  const plans={}; (res.files||[]).forEach(p=>{plans[p.id]=p;});
  S.tool.plans=plans; render();
}
let _toolReplanT=null;
function scheduleToolReplan(){ clearTimeout(_toolReplanT); _toolReplanT=setTimeout(refreshToolPlans,600); }

// 底部三段阶段文案纯装饰轮换(无后端进度协议),真实耗时在首次静音检测
async function runSplitExec(){
  const ready=S.tool.files.filter(f=>f.id&&!f.uploading);
  if(!ready.length){ toast('没有已就绪的文件'); return; }
  const phases=['检测静音…','规划切点…','切分并导出片段…'];
  S.tool.status='running'; S.tool.phase=phases[0]; render();
  let pi=0; const timer=setInterval(()=>{pi=(pi+1)%phases.length;S.tool.phase=phases[pi];render();},1400);
  try{
    const res=await api('/api/split/run',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({uploads:ready.map(f=>f.id),output_dir:S.tool.outPath||'out',
        chunk_secs:toolChunkVal(),silence_db:S.tool.silenceDb,silence_min:S.tool.silenceMin,
        skip_silence:S.tool.skipSilence,skip_min:S.tool.skipMin})});
    clearInterval(timer);
    if(res.error){ S.tool.status='idle'; render(); toast(res.error); return; }
    S.tool.results=res.results||[]; S.tool.status='done'; render();
    const fail=S.tool.results.filter(r=>!r.ok);
    if(fail.length) toast(fail.length+' 个文件切分失败');
  }catch(e){ clearInterval(timer); S.tool.status='idle'; render(); toast('切分失败'); }
}

// 转录进度轮询：转录 POST 阻塞期间每秒拉一次 /api/transcribe/progress
// （旧后端无此端点 → catch 静默,底栏退化为纯 spinner）
async function pollTransProgress(){
  try{S.transProgress=await api('/api/transcribe/progress');render();}catch(e){}
}

async function startTranscribe(){
  const uploads=S.files.filter(f=>f.id&&!f.uploading).map(f=>f.id);
  if(!uploads.length){ toast('没有已就绪的文件'); return; }
  if(S.plan&&S.plan.error){ toast(S.plan.error); return; } // 手动候选集装不下等预览错误
  // 执行前确认:普通路径也确认(花的是不可退的免费额度),切分/注册并入同一应用内弹层
  const splits=((S.plan&&S.plan.files)||[]).filter(x=>x.segCount);
  const reg=(S.plan&&S.plan.registerCount)||0;
  const totalNeed=(S.plan&&S.plan.totalNeed)||0;
  const allocCount=((S.plan&&S.plan.alloc)||[]).length;
  const lines=[`预计消耗 ${fmt(totalNeed)} credits · 覆盖 ${allocCount} 个账号`];
  if(splits.length)lines.push(`${splits.length} 个文件将切分为 ${splits.reduce((a,x)=>a+x.segCount,0)} 段`);
  if(reg)lines.push(`需注册 ${reg} 个新账号`);
  lines.push('免费额度消耗后不可退,请确认无误');
  if(!await uiConfirm({lines,okLabel:'开始转录'}))return;
  const confirmedRegister=reg>0;   // 首轮弹层已含注册确认
  S.status='running'; S.transProgress=null; render();
  const timer=setInterval(pollTransProgress,1000);   // 真实进度轮询(同 runRegister 模式)
  const send=flag=>api('/api/transcribe',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({uploads,params:S.params,confirmRegister:flag,allowedEmails:S.allowedEmails})});
  let res;
  try{
    res=await send(confirmedRegister);
    if(res.needRegister){   // 预览与实际余额有偏差时的后端兜底
      if(confirmedRegister){ res=await send(true); }   // 用户已在弹层同意注册 → 静默续跑,不二次打断(消除双弹)
      else if(await uiConfirm({lines:[`需注册 ${res.needRegister} 个新账号后继续`],okLabel:'继续'})){ res=await send(true); }
      else { clearInterval(timer); S.status='idle'; S.transProgress=null; render(); return; }
    }
  }catch(e){ clearInterval(timer); S.status='idle'; render(); toast('转录请求失败'); return; }
  clearInterval(timer);
  await pollTransProgress();   // 补齐尾部日志(含失败原因)
  if(res.error){ if(res.state)S.data=res.state; S.status='idle'; render(); toast(res.error); return; } // 失败:S.transProgress 保留,日志面板可继续查看
  // map results back onto file entries + auto-download
  S.results=res.results||[];
  S.results.forEach(r=>{
    const f=S.files.find(x=>x.name===r.name);
    if(f){ f.failed=!r.ok; f.download=r.download; f._content=r.content; }
    if(r.ok&&r.content) downloadB64(r.download,r.content);
    if(!r.ok) toast(`${r.name} 失败`);
  });
  if(res.state) S.data=res.state;
  S.transProgress=null; S.transLogOpen=false;   // 成功:清空进度
  S.status='done'; render();
}

document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]'); if(!el) return;
  const act=el.dataset.act, arg=el.dataset.arg;
  const handlers={
    toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';applyTheme(S.theme);render();},
    goTranscribe(){S.view='transcribe';S.sortOpen=false;S.revealed=[];render();},
    goAccounts(){S.view='accounts';S.revealed=[];reloadState();},
    goTools(){S.view='tools';S.sortOpen=false;S.revealed=[];render();},
    // 功能管理 · 长音频切分
    toolToggle(){S.tool.expanded=S.tool.expanded.includes(arg)?S.tool.expanded.filter(x=>x!==arg):[...S.tool.expanded,arg];render();},
    toolRemove(){S.tool.files=S.tool.files.filter(f=>String(f.id==null?'':f.id)!==arg);delete S.tool.plans[arg];S.tool.expanded=S.tool.expanded.filter(x=>x!==arg);S.tool.status='idle';render();refreshToolPlans();}, // id==null → 上传失败行,data-arg 为空串也能移除
    clearToolFiles(){S.tool.files=[];S.tool.plans={};S.tool.expanded=[];S.tool.status='idle';S.tool.results=[];render();},
    toggleAdv(){S.tool.advOpen=!S.tool.advOpen;render();},
    tgToolSkip(){S.tool.skipSilence=!S.tool.skipSilence;render();scheduleToolReplan();},
    decChunk(){S.tool.chunkSecs=String(Math.max(30,Math.min(1800,toolChunkVal()-10)));render();scheduleToolReplan();},
    incChunk(){S.tool.chunkSecs=String(Math.max(30,Math.min(1800,toolChunkVal()+10)));render();scheduleToolReplan();},
    runSplit(){runSplitExec();},
    resetSplit(){S.tool.files=[];S.tool.plans={};S.tool.expanded=[];S.tool.status='idle';S.tool.results=[];S.tool.phase='';render();},
    // transcribe
    clearFiles(){S.files=[];S.plan=null;S.status='idle';S.results=[];render();},
    removeFile(){S.files.splice(+arg,1);render();refreshPlan();},
    setBatch(){S.mode='batch';render();}, setPerfile(){S.mode='perfile';render();},
    toggleLang(){S.langOpen=!S.langOpen;render();},
    pickLang(){S.params.language=el.dataset.code;S.params.languageName=el.dataset.name;S.langOpen=false;render();refreshPlan();},
    pickFormat(){S.params.format=arg;render();},
    removeTerm(){S.params.vocab.splice(+arg,1);render();},
    start(){startTranscribe();}, reset(){S.files=[];S.plan=null;S.status='idle';S.results=[];S.transProgress=null;S.transLogOpen=false;render();},
    // 高级 · 手动指定账号
    toggleAcctPanel(){S.acctPanelOpen=!S.acctPanelOpen;render();},
    toggleAllowed(){S.allowedEmails=S.allowedEmails.includes(arg)?S.allowedEmails.filter(x=>x!==arg):[...S.allowedEmails,arg];render();refreshPlan();},
    clearAllowed(){S.allowedEmails=[];render();refreshPlan();},
    toggleTransLog(){S.transLogOpen=!S.transLogOpen;render();},
    confirmOk(){closeConfirm(true);}, confirmCancel(){closeConfirm(false);},
    download(){const f=S.files[+arg];if(f&&f._content)downloadB64(f.download,f._content);},
    downloadAll(){S.results.filter(r=>r.ok&&r.content).forEach(r=>downloadB64(r.download,r.content));},
    // accounts
    toggleSel(){S.selected=S.selected.includes(arg)?S.selected.filter(x=>x!==arg):[...S.selected,arg];render();},
    toggleRev(){S.revealed=S.revealed.includes(arg)?S.revealed.filter(x=>x!==arg):[...S.revealed,arg];render();},
    copyEmail(){try{navigator.clipboard.writeText(arg);toast('已复制邮箱');}catch(e){}},
    copyPw(){const a=(S.data?S.data.accounts:[]).find(x=>x.email===arg);if(a&&a.password){try{navigator.clipboard.writeText(a.password);toast('已复制密码 · 30 秒后自动清除剪贴板');clearClipboardLater(a.password);}catch(e){}}},
    hideAllPw(){S.revealed=[];render();},
    toggleAll(){const list=S._pageEmails;const all=list.length>0&&list.every(x=>S.selected.includes(x));S.selected=all?S.selected.filter(x=>!list.includes(x)):[...new Set([...S.selected,...list])];render();},
    clearSel(){S.selected=[];render();},
    toggleSort(){S.sortOpen=!S.sortOpen;render();},
    pickSort(){S.sortKey=arg;S.sortOpen=false;S.page=1;render();},
    toggleDir(){S.sortDir=S.sortDir==='asc'?'desc':'asc';S.page=1;render();},
    prevPage(){S.page=Math.max(1,S._page-1);render();},
    nextPage(){S.page=Math.min(S._totalPages,S._page+1);render();},
    gotoPage(){S.page=+arg;render();},
    setPageSize(){S.pageSize=+arg;S.page=1;render();},
    async delOne(){const em=arg;if(await uiConfirm({title:'删除账号',lines:['将删除账号 '+em,'该账号的登录令牌会一并从本机移除,此操作不可撤销。'],okLabel:'删除账号',danger:true}))deleteAccounts([em]);},
    async delSel(){const ems=S.selected.slice();if(!ems.length)return;const preview=ems.slice(0,5);const more=ems.length>5?`…等共 ${ems.length} 个账号`:'';if(await uiConfirm({title:`删除 ${ems.length} 个账号`,lines:[...preview,more,'这些账号的登录令牌会一并从本机移除,此操作不可撤销。'].filter(Boolean),okLabel:`删除 ${ems.length} 个`,danger:true}))deleteAccounts(ems);},
    refreshSel(){refreshCredits(S.selected.slice());},
    exportSel(){exportAccounts(S.selected.slice());},
    closeImport(){S.importOpen=null;render();},
    openLogin(){S.login={email:'',password:''};S.loginOpen=true;render();}, closeLogin(){if(S.busy!=='login'){S.loginOpen=false;render();}},
    openReg(){const te=(S.data&&S.data.tempEmail)||{};S.reg={base_url:te.base_url||'',admin_password:te.admin_password||'',site_password:te.site_password||'',domain:te.domain||'',domains:te.domains||[],use_admin_path:te.use_admin_path!==false,poll_interval_secs:te.poll_interval_secs!=null?te.poll_interval_secs:3,poll_timeout_secs:te.poll_timeout_secs!=null?te.poll_timeout_secs:120,target:(S.data&&S.data.pool&&S.data.pool.target)||3};S.regOpen=true;render();}, closeReg(){if(S.busy!=='register'){S.regOpen=false;S.regProgress=null;render();}},
    setAdminPath(){S.reg.use_admin_path=true;render();}, setApiPath(){S.reg.use_admin_path=false;render();},
    decCount(){S.reg.target=Math.max(1,(+S.reg.target||1)-1);render();}, incCount(){S.reg.target=(+S.reg.target||0)+1;render();},
    doLogin(){runLogin();},
    doRegSave(){runRegSave();},
    async doReg(){const t=parseInt(String((S.reg&&S.reg.target)||'').replace(/[^0-9]/g,''),10)||0;if(await uiConfirm({title:'确认批量创建账号',lines:[`将通过临时邮箱批量注册,把满额账号补至 ${t} 个。`,'注册所得邮箱与密码将以明文保存在本机 accounts.json。','批量注册可能违反 ElevenLabs 服务条款,请自行评估风险。'],okLabel:'我已知悉,开始创建'}))runRegister();},
    stop(){e.stopPropagation();},
  };
  if(act.startsWith('tg:')){const k=act.slice(3);S.params[k]=!S.params[k];render();if(k==='skip_silence')refreshPlan();return;} // 跳静音影响切分段数 → 重算预览
  if(handlers[act])handlers[act]();
});

document.addEventListener('input',e=>{
  const el=e.target.closest('[data-input]'); if(!el) return;
  const k=el.dataset.input;
  if(k==='pickFiles'){addFiles(el.files);}
  else if(k==='query'){S.query=el.value;S.selected=[];S.page=1;const pos=el.selectionStart;render();const n=document.querySelector('[data-input="query"]');if(n){n.focus();n.setSelectionRange(pos,pos);}}
  else if(k==='importFile'){if(el.files[0])importAccounts(el.files[0]);el.value='';} // 清空 value,同一文件可重复导入
  else if(k.startsWith('login.')){if(S.login)S.login[k.slice(6)]=el.value;} // no render → keep focus
  else if(k.startsWith('reg.')){if(S.reg)S.reg[k.slice(4)]=el.value;}   // no render → keep focus
  else if(k==='langQuery'){S.langQuery=el.value;const rows=document.querySelector('[data-lang-rows]');if(rows)rows.innerHTML=langRowsHTML();else render();} // 局部更新选项行,输入框不重建 → 焦点保留、零闪烁;拿不到容器时兜底走全量 render
  else if(k==='keyterm'){S.keyterm=el.value;}
  else if(k==='tool.outPath'){S.tool.outPath=el.value;} // 仅改展示路径,无 render 保焦点(下次 render 生效)
  else if(k.startsWith('tool.')){S.tool[k.slice(5)]=el.value;scheduleToolReplan();} // chunk/静音参数:no render 保焦点 + 去抖重算
});

// 拖放上传：委托风格，drop 区用 [data-drop] 标识，复用 addFiles()。
// 高亮直接改当前 label 的 style（只变色不改尺寸/边框宽度/padding,避免布局抖动;
// label 虽由 render() 模板重渲染,但拖放交互期间不会触发 render(),故直接操作 style 可靠且无需持久 class）。
// dragleave 在子元素间冒泡会误触发,用计数器 dropDepth 避免高亮闪烁。
let dropDepth=0;
function setDropHi(el,on){el.style.borderColor=on?'var(--accent)':'var(--border)';el.style.background=on?'var(--muted)':'var(--muted2)';}
// 拖拽事件的 target 在部分浏览器（如 Firefox 悬停在文本内容上时）可能是文本节点,
// 文本节点没有 closest(),直接调用会抛错并导致高亮残留/失效,故先归一到元素节点。
function dropZone(t){ if(t&&t.nodeType===3)t=t.parentElement; return t&&t.closest?t.closest('[data-drop]'):null; }
document.addEventListener('dragenter',e=>{
  const el=dropZone(e.target); if(!el)return;
  e.preventDefault(); dropDepth++; setDropHi(el,true);
});
document.addEventListener('dragleave',e=>{
  const el=dropZone(e.target); if(!el)return;
  dropDepth=Math.max(0,dropDepth-1); if(dropDepth===0)setDropHi(el,false);
});
document.addEventListener('dragover',e=>{
  e.preventDefault(); // 全局兜底：阻止浏览器把文件当 URL 打开
  const el=dropZone(e.target); if(el&&e.dataTransfer)e.dataTransfer.dropEffect='copy';
});
document.addEventListener('drop',e=>{
  e.preventDefault(); // 全局兜底
  const el=dropZone(e.target); dropDepth=0;
  if(el){setDropHi(el,false); if(e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files.length)addFiles(e.dataTransfer.files);}
});
document.addEventListener('keydown',e=>{
  const el=e.target.closest('[data-enter]'); if(!el||e.key!=='Enter')return;
  if(el.dataset.enter==='addTerm'){const v=S.keyterm.trim();if(v&&!S.params.vocab.includes(v))S.params.vocab.push(v);S.keyterm='';render();const n=document.querySelector('[data-input="keyterm"]');if(n)n.focus();} // render 后把焦点还给 keyterm 输入框,可直接继续输入下一个词
  else if(el.dataset.enter==='submitLogin'){if(S.busy!=='login')runLogin();}
});

// 键盘可用性:Esc 取消确认弹层;Enter/Space 激活聚焦的非原生 [data-act] 元素(复用 click 委托)
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&S.confirmBox){e.preventDefault();closeConfirm(false);return;}
  if(e.key!=='Enter'&&e.key!==' ')return;
  // 拖拽上传区是 <label>+隐藏 file input,键盘激活时触发内部 input 打开选择器
  const drop=e.target.closest&&e.target.closest('[data-drop]');
  if(drop){const inp=drop.querySelector('input[type=file]');if(inp){e.preventDefault();inp.click();}return;}
  const el=e.target.closest&&e.target.closest('[data-act]');
  if(!el||/^(BUTTON|A|INPUT|TEXTAREA)$/.test(el.tagName))return;
  e.preventDefault(); el.click();
});

async function reloadState(){S.data=await api('/api/state');render();}
async function deleteAccounts(emails){S.data=await api('/api/accounts/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({emails})});S.selected=S.selected.filter(x=>!emails.includes(x));render();toast('已删除');}
async function refreshCredits(emails){toast('刷新中…');S.data=await api('/api/accounts/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({emails})});render();toast('额度已刷新');}
// 导出走后端拿完整原始记录(含 refreshToken 等凭据),前端视图数据脱敏后不可导入
async function exportAccounts(emails){
  if(!emails.length){toast('请先选择要导出的账号');return;}
  const res=await api('/api/accounts/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({emails})});
  const blob=new Blob([JSON.stringify(res.accounts||[],null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='accounts-export.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('已导出 '+(res.accounts||[]).length+' 个账号');
}
async function importAccounts(file){
  let accounts;
  try{
    const parsed=JSON.parse(await file.text());
    accounts=Array.isArray(parsed)?parsed:parsed&&Array.isArray(parsed.accounts)?parsed.accounts:null;
  }catch(e){}
  if(!accounts){S.importOpen={fileName:file.name,error:'文件格式无效：应为账号数组,或 {"accounts": [...]} 结构的 JSON。'};render();return;}
  try{
    const res=await api('/api/accounts/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accounts})});
    if(res.error){S.importOpen={fileName:file.name,error:res.error};}
    else{S.data=res;S.importOpen={fileName:file.name,added:res.imported,skipped:res.skipped};}
  }catch(e){S.importOpen={fileName:file.name,error:'导入失败：'+e};}
  render();
}

// 登录账号 → email+password REST sign-in on the backend, saves the token to the pool
async function runLogin(){
  const email=((S.login&&S.login.email)||'').trim(), password=(S.login&&S.login.password)||'';
  if(!email||!password){toast('请输入邮箱和密码');return;}
  S.busy='login'; render();
  try{
    const res=await api('/api/accounts/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    if(res.error){toast(res.error);}
    else{S.data=res;S.loginOpen=false;toast('已登录并保存账号');}
  }catch(e){toast('登录失败');}
  S.busy=null; render();
}
// 启动注册机 config ↔ config.toml [temp_email]/[accounts].pool_target sync
function regPayload(){const r=S.reg||{};return {temp_email:{base_url:r.base_url,admin_password:r.admin_password,site_password:r.site_password,domain:r.domain,use_admin_path:!!r.use_admin_path,poll_interval_secs:r.poll_interval_secs,poll_timeout_secs:r.poll_timeout_secs},pool_target:r.target};}
async function saveRegConfig(){const res=await api('/api/config/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(regPayload())});if(res&&!res.error)S.data=res;return res;}
async function runRegSave(){const res=await saveRegConfig();toast(res&&res.error?res.error:'配置已保存到 config.toml');render();}
// 注册进度轮询：注册 POST 阻塞期间每秒拉一次 /api/accounts/register/progress
async function pollRegProgress(){
  try{S.regProgress=await api('/api/accounts/register/progress');render();}catch(e){}
}
// real 启动注册机 → sync config to config.toml, then run `pool warm` to the target
async function runRegister(){
  const t=parseInt(String((S.reg&&S.reg.target)||'').replace(/[^0-9]/g,''),10);
  if(!t||t<1){toast('请输入有效的目标数量');return;}
  S.busy='register'; S.regProgress=null; render();
  let timer=null;
  try{
    const saved=await saveRegConfig();                 // sync config.toml first
    if(saved&&saved.error){toast(saved.error);S.busy=null;render();return;}
    timer=setInterval(pollRegProgress,1000);
    const res=await api('/api/accounts/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target:t})});
    clearInterval(timer); timer=null;
    await pollRegProgress();                           // 补齐尾部日志(含 error 行)
    if(res.error){if(res.state)S.data=res.state;toast(res.error);}   // 失败:弹窗留在日志视图
    else{S.data=res;S.regOpen=false;S.regProgress=null;toast('注册完成');}
  }catch(e){if(timer)clearInterval(timer);toast('注册失败');}
  S.busy=null; render();
}

// -------------------------------------------------------------------- boot
(async function(){
  let dark=false; try{dark=matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches;}catch(e){}
  S.theme=dark?'dark':'light'; applyTheme(S.theme);
  S.data=await api('/api/state');
  if(S.data.defaults){Object.assign(S.params,{
    tag_audio_events:S.data.defaults.tag_audio_events, include_subtitles:S.data.defaults.include_subtitles,
    no_verbatim:S.data.defaults.no_verbatim, use_speaker_library:S.data.defaults.use_speaker_library,
    format:S.data.defaults.export_format, show_cost:S.data.defaults.show_cost});}
  render();
})();
</script>
